services:
  countries-rest:
    build:
      context: ./mock-rest-apis
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: countries
      PORT: 3000
    ports:
      - "3001:3000"

  # valkey:
  #   image: valkey/valkey:8-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - valkey-data:/data
  #   healthcheck:
  #     test: ["CMD", "valkey-cli", "ping"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5

  grafbase:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["grafbase", "dev", "--listen-address", "0.0.0.0:5000"]
    ports:
      - "5001:5000"
    depends_on:
      - countries-rest
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:5000"]
      interval: 5s
      timeout: 3s
      retries: 5

  # GraphiQL UI (optional)
  # Uncomment to enable GraphiQL explorer on http://localhost:8080
  # graphiql:
  #   image: ghcr.io/graphql-explorer/graphiql:latest
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     GRAPHQL_ENDPOINT: http://grafbase:5000/graphql
  #   depends_on:
  #     - grafbase