services:

  accounts-rest:
    build:
      context: ./mock-rest-apis/accounts
    environment:
      SERVICE_NAME: accounts
      PORT: 3000
      EXPECTED_API_KEY: ${ACCOUNTS_API_KEY:-accounts-local-key}
    ports:
      - "3001:3001"

  policies-rest:
    build:
      context: ./mock-rest-apis/policies
    environment:
      SERVICE_NAME: policies
      PORT: 3000
      EXPECTED_API_KEY: ${POLICIES_API_KEY:-policies-local-key}
    ports:
      - "3003:3003"

  funds-rest:
    build:
      context: ./mock-rest-apis/funds
    environment:
      SERVICE_NAME: funds
      PORT: 3000
      EXPECTED_API_KEY: ${FUNDS_API_KEY:-funds-local-key}
    ports:
      - "3002:3002"

  countries-rest:
    build:
      context: ./mock-rest-apis
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: countries
      PORT: 3000
    ports:
      - "3004:3004"

  # Redis-compatible cache backing the gateway's entity_caching
  # (grafbase.toml -> [entity_caching.redis] url = redis://valkey:6379).
  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  grafbase:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["grafbase", "dev", "--listen-address", "0.0.0.0:5050"]
    # command: ["grafbase", "dev", "--listen-address", "0.0.0.0:5050"]
    ports:
      - "5050:5050"
    depends_on:
      accounts-rest:
        condition: service_started
      policies-rest:
        condition: service_started
      funds-rest:
        condition: service_started
      valkey:
        condition: service_healthy
    environment:
      NODE_ENV: production
      COUNTRIES_BASE_URL: http://countries-rest:3004
      # Forwarded to @restEndpoint headers via grafbase.toml -> {{ config.* }}.
      # NOTE: when the gateway runs in-container, switch the @restEndpoint
      # baseURLs in schema.graphql to the docker service names (see comments there).
      ACCOUNTS_API_KEY: ${ACCOUNTS_API_KEY:-accounts-local-key}
      POLICIES_API_KEY: ${POLICIES_API_KEY:-policies-local-key}
      FUNDS_API_KEY: ${FUNDS_API_KEY:-funds-local-key}
    # healthcheck:
    #   test: ["CMD", "wget", "-q", "-O-", "http://localhost:5050"]
    #   interval: 5s
    #   timeout: 3s
    #   retries: 5

  # GraphiQL UI (optional)
  # Uncomment to enable GraphiQL explorer on http://localhost:8080
  # graphiql:
  #   image: ghcr.io/graphql-explorer/graphiql:latest
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     GRAPHQL_ENDPOINT: http://grafbase:5050/graphql
  #   depends_on:
  #     - grafbase

  # graphiql:
  #   build:
  #     context: ./explorer
  #   ports:
  #     - "8080:8080"
  #   # depends_on:
  #   #   - grafbase

  graphiql:
    build:
      context: ./graphiql-vite
      dockerfile: Dockerfile
    ports:
      - "5173:80"

volumes:
  # Persists the valkey/redis entity cache across `docker compose down/up`.
  valkey-data: