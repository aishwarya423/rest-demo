[extensions.rest]
path = "grafbase_extensions/rest/0.5.2"

# Config for the rest extension. The extension looks up config.subgraphs.<name>
# and exposes that object to @restEndpoint header templates as `{{ config.* }}`.
# Keys are read from the environment so no secrets live in the repo.
[extensions.rest.config.subgraphs.insurance]
accountsApiKey = "{{ env.ACCOUNTS_API_KEY }}"
policiesApiKey = "{{ env.POLICIES_API_KEY }}"
fundsApiKey = "{{ env.FUNDS_API_KEY }}"

[subgraphs.insurance]
schema_path = "schema.graphql"

# Per-subgraph entity-caching override. This project has exactly ONE subgraph,
# `insurance` (accounts/funds/policies are REST endpoints inside it, not
# separate subgraphs), so this is the only valid per-subgraph target. Values
# default to the global [entity_caching] settings below when omitted.
[subgraphs.insurance.entity_caching]
enabled = true
ttl = "120s"

[graph]
path = "/graphql"
introspection = true

# ===========================================================================
# CACHING — full details & testing guide in Docs/CACHING.md
# Both blocks below activate only under the PRODUCTION gateway
# (grafbase-gateway). `grafbase dev` ignores caching, so it is a no-op with the
# current docker-compose command (which runs `grafbase dev`). Redis host is the
# `redis` compose service (docker-compose.yml); use redis://localhost:6379 for
# host-side testing. Use rediss:// (+ a [*.redis.tls] table) for TLS.
# ===========================================================================

# --- Operation caching — VERIFIED WORKING with Redis (writes cached query
# plans; see Docs/CACHING.md). Presence of [operation_caching.redis] switches
# the backend to Redis (no `storage` key, unlike entity caching below).
[operation_caching]
enabled = true
limit = 1000

[operation_caching.redis]
url = "redis://redis:6379"
key_prefix = "insurance-opcache"

# --- Entity caching — documented-correct format, but a VERIFIED no-op in THIS
# graph: entity caching stores *subgraph fetches*, and the single `insurance`
# subgraph is resolved by the REST WASM extension (no cacheable subgraph fetch),
# so nothing lands in Redis even under the production gateway. Kept as a ready
# template; storage MUST be "redis" (defaults to "memory") to use the table.
[entity_caching]
enabled = true
ttl = "60s"
storage = "redis"

[entity_caching.redis]
url = "redis://redis:6379"
key_prefix = "insurance-entitycache"
